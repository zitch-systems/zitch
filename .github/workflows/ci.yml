name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['landing/**', 'docs/**', '**/*.md']
  pull_request:
    paths-ignore: ['landing/**', 'docs/**', '**/*.md']

# Cancel superseded runs so a burst of pushes doesn't stack up Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which suites actually need to run for this change, so a backend-only
  # PR doesn't spin up the (heavier) Expo job and vice versa — the single biggest
  # lever on Actions minutes. The backend/app jobs gate on these outputs; a job
  # skipped this way still reports success, so required-status-check branch
  # protection is unaffected (unlike a workflow-level paths filter, which would
  # leave a required check pending forever).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      # fetch-depth: 0 so the diff below can reach the PR base / previous push.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # Inline path filter (a plain git diff) instead of a third-party action, so
      # the job runs under an org "Allowed actions" policy that only permits
      # GitHub-authored actions. Mirrors the previous dorny/paths-filter config.
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Pick the commit to diff against: the PR base on pull_request, the
          # pre-push tip on push.
          if [ "$EVENT" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi
          # Fall back to the first parent when base is missing or unknown to git
          # (new branch, force-push, or shallow gap) so we never diff the world.
          if [ -z "${base:-}" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          files="$(git diff --name-only "$base" "$HEAD_SHA")"
          echo "Changed files since $base:"
          echo "$files"

          matches() { printf '%s\n' "$files" | grep -qE "$1"; }

          backend=false
          app=false
          if matches '^backend/' || matches '^\.github/workflows/ci\.yml$'; then
            backend=true
          fi
          if matches '^(app|components|constants|hooks|lib|assets|shims|scripts)/' \
            || matches '^(package\.json|package-lock\.json|tsconfig\.json|app\.json|babel\.config\.js|metro\.config\.js|eas\.json)$' \
            || matches '^\.github/workflows/ci\.yml$'; then
            app=true
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "Resolved: backend=$backend app=$app"

  backend:
    name: Backend (Django)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      # CI runs with the production-secure default (DEBUG off). Provide a
      # throwaway secret so the management commands below clear the "no dev
      # SECRET_KEY when DEBUG is off" boot guard. Not a real secret; the test
      # step is unaffected (Django forces DEBUG off under tests anyway).
      DJANGO_SECRET_KEY: "ci-only-throwaway-secret-not-used-in-production-000"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: System check
        run: python manage.py check
      - name: Migrations are complete
        run: python manage.py makemigrations --check --dry-run
      - name: Migrate + seed (SQLite)
        run: |
          python manage.py migrate --no-input
          python manage.py seed_plans
      - name: Tests
        run: python manage.py test

  app:
    name: App (Expo)
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test -- --ci
      # The full Metro/iOS bundle is the most minute-heavy step and rarely catches
      # what tsc + jest miss, so only run it on pushes to main (the merged result),
      # not on every PR revision.
      - name: Bundle (Metro export, iOS)
        if: github.event_name == 'push'
        run: npx expo export --platform ios --output-dir /tmp/ciexport
