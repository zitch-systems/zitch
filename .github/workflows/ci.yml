name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['landing/**', 'docs/**', '**/*.md']
  pull_request:
    paths-ignore: ['landing/**', 'docs/**', '**/*.md']

# Cancel superseded runs so a burst of pushes doesn't stack up Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    env:
      # CI runs with the production-secure default (DEBUG off). Provide a
      # throwaway secret so the management commands below clear the "no dev
      # SECRET_KEY when DEBUG is off" boot guard. Not a real secret; the test
      # step is unaffected (Django forces DEBUG off under tests anyway).
      DJANGO_SECRET_KEY: "ci-only-throwaway-secret-not-used-in-production-000"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: System check
        run: python manage.py check
      - name: Migrations are complete
        run: python manage.py makemigrations --check --dry-run
      - name: Migrate + seed (SQLite)
        run: |
          python manage.py migrate --no-input
          python manage.py seed_plans
      - name: Tests
        run: python manage.py test

  app:
    name: App (Expo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test -- --ci
      - name: Bundle (Metro export, iOS)
        run: npx expo export --platform ios --output-dir /tmp/ciexport
