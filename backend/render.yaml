# Render blueprint. In Render: New + > Blueprint > point at this repo (root
# dir = backend). Creates the web service + a managed Postgres and wires them.
services:
  - type: web
    name: zitch-api
    runtime: python
    rootDir: backend
    plan: free   # upgrade to "starter" before handling real money (no sleep)
    buildCommand: "./build.sh"
    startCommand: "gunicorn zitch_api.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: TOKEN_TTL_HOURS
        value: "24"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString
      # Fill these in the Render dashboard (kept out of source):
      - key: VTPASS_API_KEY
        sync: false
      - key: VTPASS_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false

  # Daily job: pay out matured Fixed Save plans.
  - type: cron
    name: zitch-maturities
    runtime: python
    rootDir: backend
    plan: free
    schedule: "0 1 * * *"   # 01:00 UTC daily
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_maturities"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString

databases:
  - name: zitch-db
    plan: free   # upgrade before go-live; free Postgres expires
