<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zitch Admin — Operator Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#23B1A8; --teal-deep:#00847B; --teal-ink:#004D47; --cyan:#5CF5EB;
    --navy:#02344A; --navy-3:#062B3D;
    --ink:#141414; --t2:#4A4E57; --t3:#7B828E;
    --bg:#F4F7F8; --card:#fff; --line:#E5EAEC;
    --disp:'Space Grotesk',sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--mono);font-size:12.5px;}
  .dim{color:var(--t3);} .sm{font-size:12px;} .pos{color:#0B7A43;font-weight:600;}
  .r{text-align:right;} .w100{width:100%;}

  /* shell */
  .shell{display:flex;min-height:100vh;}
  .side{width:236px;flex-shrink:0;background:var(--navy);color:#A9C6CF;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .side-brand{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;font-family:var(--disp);font-weight:700;letter-spacing:.14em;color:#fff;font-size:15px;}
  .side-brand img{height:24px;} .side-brand em{font-style:normal;color:var(--cyan);font-weight:500;letter-spacing:.02em;}
  .side-nav{display:flex;flex-direction:column;gap:2px;padding:8px 12px;flex:1;}
  .side-link{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;background:none;border:none;color:#A9C6CF;font:inherit;font-weight:500;cursor:pointer;text-align:left;transition:background .15s,color .15s;}
  .side-link:hover{background:rgba(255,255,255,.06);color:#fff;}
  .side-link.on{background:rgba(92,245,235,.12);color:var(--cyan);}
  .side-pill{margin-left:auto;background:var(--cyan);color:var(--navy);font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 7px;}
  .side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:18px;background:#fff;border-bottom:1px solid var(--line);padding:0 28px;height:60px;position:sticky;top:0;z-index:30;}
  .env-pill{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--teal-deep);background:#E7F6F5;border-radius:999px;padding:6px 13px;}
  .env-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
  .role-pick{display:flex;align-items:center;gap:8px;color:var(--t2);}
  .role-pick select{font:inherit;font-weight:600;color:var(--navy);border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff;cursor:pointer;}
  .me{display:flex;align-items:center;gap:9px;font-weight:600;}
  .content{padding:26px 28px 60px;max-width:1280px;width:100%;}

  .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:20px;flex-wrap:wrap;}
  .page-head h1{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--navy);margin:0;}
  .page-head p{margin:5px 0 0;color:var(--t3);font-size:13.5px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .card-head{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:18px 20px 14px;}
  .card-title{font-family:var(--disp);font-weight:600;font-size:15.5px;color:var(--navy);}
  .card-sub{font-size:12.5px;color:var(--t3);margin-top:3px;}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
  .kpi{display:flex;gap:14px;align-items:center;padding:18px;}
  .kpi-ic{width:42px;height:42px;border-radius:12px;background:#E7F6F5;color:var(--teal-deep);display:grid;place-items:center;flex-shrink:0;}
  .kpi-l{font-size:12.5px;color:var(--t3);}
  .kpi-v{font-family:var(--disp);font-size:23px;font-weight:700;color:var(--navy);margin-top:2px;}
  .kpi-d{font-size:11.5px;font-weight:600;margin-top:3px;} .kpi-d.up{color:#0B7A43;} .kpi-d.down{color:#B42318;}

  .grid-2-1{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:18px;align-items:start;}

  .bars{display:flex;align-items:flex-end;gap:7px;height:170px;padding-top:8px;}
  .bar-col{flex:1;height:100%;display:flex;align-items:flex-end;}
  .bar{width:100%;border-radius:6px 6px 2px 2px;background:var(--teal);min-height:6px;}
  .bars-x{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:8px;}

  .prov-list{display:grid;}
  .prov-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
  .prov-row:first-child{border-top:none;}
  .prov-name{font-weight:600;} .prov-role{font-size:12px;color:var(--t3);margin-top:1px;}
  .prov-up{font-size:11.5px;color:var(--t3);margin-top:3px;}

  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
  .tbl th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:12px 20px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .tbl th.r{text-align:right;}
  .tbl td{padding:13px 20px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl tr.click{cursor:pointer;} .tbl tr.click:hover td{background:#F7FBFA;}

  .badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.02em;padding:4px 10px;border-radius:999px;white-space:nowrap;}
  .avatar{width:32px;height:32px;border-radius:50%;background:#E7F6F5;color:var(--teal-deep);font-size:11.5px;font-weight:700;display:inline-grid;place-items:center;flex-shrink:0;}
  .u-cell{display:flex;align-items:center;gap:11px;}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{font:inherit;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--t2);cursor:pointer;transition:all .15s;}
  .chip:hover{border-color:var(--teal);color:var(--teal-deep);}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff;}

  .searchbox{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;color:var(--t3);min-width:250px;}
  .searchbox input{border:none;outline:none;font:inherit;width:100%;background:none;}
  .searchbox:focus-within{border-color:var(--teal);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font:inherit;font-weight:600;font-size:13.5px;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;transition:background .15s;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn.primary{background:var(--teal-deep);color:#fff;} .btn.primary:hover:not(:disabled){background:var(--teal-ink);}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);} .btn.ghost:hover:not(:disabled){border-color:var(--teal);color:var(--teal-deep);}
  .btn.danger{background:#FDEAEA;color:#B42318;} .btn.danger:hover:not(:disabled){background:#FAD5D2;}
  .sm-btn{padding:7px 12px;font-size:12.5px;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;border-radius:8px;} .icon-btn:hover{background:#F0F4F5;color:var(--ink);}

  .tgl{width:40px;height:23px;border-radius:999px;border:none;background:#D4DCDF;position:relative;cursor:pointer;transition:background .15s;padding:0;flex-shrink:0;}
  .tgl .knob{position:absolute;top:2.5px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .tgl.on{background:var(--teal);} .tgl.on .knob{left:19px;}
  .tgl.dis{opacity:.45;cursor:not-allowed;}

  .drawer-veil{position:fixed;inset:0;background:rgba(2,52,74,.35);z-index:80;display:flex;justify-content:flex-end;}
  .drawer{background:#fff;height:100%;box-shadow:-20px 0 50px rgba(2,52,74,.18);display:flex;flex-direction:column;max-width:94vw;}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .drawer-body{padding:20px 22px;overflow-y:auto;}
  .drawer-sec{font-family:var(--disp);font-size:13px;color:var(--navy);margin:20px 0 10px;letter-spacing:.04em;text-transform:uppercase;}
  .drawer-actions{display:flex;gap:10px;margin-top:22px;}
  .kv{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .kv span{color:var(--t3);} .kv.tight{padding:8px 0;}
  .kv:last-of-type{border-bottom:none;}
  .wallets{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .wallet{display:flex;justify-content:space-between;background:#F7FBFA;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;}
  .wallet span{color:var(--t3);font-weight:600;} .wallet.zero{opacity:.5;}

  .note{display:flex;align-items:flex-start;gap:8px;background:#E7F6F5;color:var(--teal-ink);border-radius:10px;padding:11px 13px;font-size:12.5px;line-height:1.5;margin-top:12px;}
  .note.warn{background:#FFF4E0;color:#9A5B00;}
  .rbac-note{display:flex;align-items:center;gap:6px;color:var(--t3);font-size:12px;margin:12px 0 0;}

  .margin-edit{display:flex;align-items:center;gap:16px;}
  .margin-edit input[type=range]{flex:1;accent-color:var(--teal-deep);}
  .margin-val{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--navy);white-space:nowrap;}
  .margin-val span{font-size:13px;color:var(--t3);font-weight:500;}
  .rules{display:grid;gap:10px;}
  .rule{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--t2);line-height:1.5;}
  .rule svg{color:var(--teal-deep);flex-shrink:0;margin-top:1px;}

  /* WhatsApp inbox */
  .wa-layout{display:grid;grid-template-columns:330px 1fr;gap:16px;align-items:start;}
  .convo-list{display:flex;flex-direction:column;padding:8px;gap:2px;}
  .convo{display:flex;align-items:center;gap:11px;padding:11px 12px;border:none;background:none;font:inherit;text-align:left;border-radius:10px;cursor:pointer;width:100%;}
  .convo:hover{background:#F7FBFA;} .convo.on{background:#E7F6F5;}
  .convo-mid{flex:1;min-width:0;display:grid;} .convo-mid b{font-size:13.5px;}
  .convo-end{display:grid;gap:4px;justify-items:end;}
  .chat-pane{display:flex;flex-direction:column;height:600px;}
  .chat-pane-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .chat-scroll{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;background:#F7FAFA;}
  .bubble-row{display:flex;} .bubble-row.out{justify-content:flex-end;}
  .bubble{max-width:70%;padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;}
  .bubble.in{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px;}
  .bubble.bot{background:#DCF3F1;border-bottom-right-radius:3px;}
  .bubble.agent{background:var(--navy);color:#fff;border-bottom-right-radius:3px;}
  .intent{margin-top:7px;background:rgba(2,52,74,.06);border-radius:7px;padding:6px 9px;font-size:11px;color:var(--t2);font-family:var(--mono);word-break:break-all;}
  .bubble.agent .intent{background:rgba(255,255,255,.12);color:#C8DEE4;}
  .flag-tag{display:inline-flex;align-items:center;gap:4px;background:#FDEAEA;color:#B42318;font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 8px;margin-left:8px;}
  .chat-input{display:flex;gap:10px;padding:13px 16px;border-top:1px solid var(--line);align-items:center;}
  .chat-input input{flex:1;font:inherit;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;outline:none;}
  .chat-input input:focus{border-color:var(--teal);}

  .kill{display:flex;justify-content:space-between;gap:16px;align-items:center;}
  .f-label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin:14px 0 7px;}
  .f-input{width:100%;font:inherit;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;outline:none;}
  .f-input:focus{border-color:var(--teal);}

  .perm{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;}
  .perm.yes{background:#E6F6EE;color:#0B7A43;} .perm.no{background:#F0F2F4;color:#A6ADB4;}

  .empty{padding:40px;text-align:center;color:var(--t3);}
  .toasts{position:fixed;bottom:22px;right:22px;display:grid;gap:9px;z-index:120;}
  .toast{display:flex;align-items:center;gap:9px;background:var(--navy);color:#fff;font-size:13px;font-weight:500;padding:12px 17px;border-radius:11px;box-shadow:0 16px 40px -12px rgba(2,52,74,.5);animation:pop .25s cubic-bezier(0.34,1.56,0.64,1);}
  .toast svg{color:var(--cyan);}
  @keyframes pop{from{transform:translateY(8px);opacity:0;}to{transform:none;opacity:1;}}

  @media (max-width:1080px){
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .grid-2-1,.wa-layout{grid-template-columns:1fr;}
    .side{width:64px;} .side-brand span,.side-link{font-size:0;gap:0;} .side-link svg{margin:0 auto;} .side-pill{display:none;}
  }

/* --- live portal: login + state --- */
.login-veil { position: fixed; inset: 0; display: grid; place-items: center; background: var(--bg, #F4F6F8); }
.login-card { width: 360px; padding: 28px 26px; display: block; }
.login-card .f-input { width: 100%; box-sizing: border-box; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/static/portal/admin/data.js"></script>
<script src="/static/portal/admin/api.js"></script>
<script type="text/babel" src="/static/portal/admin/ui.jsx"></script>
<script type="text/babel" src="/static/portal/admin/views-a.jsx"></script>
<script type="text/babel" src="/static/portal/admin/views-b.jsx"></script>
<script type="text/babel" src="/static/portal/admin/views-c.jsx"></script>
<script type="text/babel" src="/static/portal/admin/portal.jsx"></script>
<style id="__om-edit-overrides"></style>
</body>
</html>
