# Codemagic CI build for the Zitch Expo (React Native) Android app.
#
# Produces an installable APK with no EAS/Expo build credits. The Expo project
# lives at the repository root, so this file sits at the root too.
#
# Builds automatically when app code lands on main (see `triggering:` below), and
# can be started anytime from the dashboard: "Start new build" → "android-apk".
workflows:
  android-apk:
    name: Zitch Android APK (preview)
    # Codemagic's free plan runs on mac_mini_m2 (500 min/month). Android builds
    # fine here — the Android SDK is preinstalled on the macOS image. Switch to
    # linux_x2 if/when your plan includes Linux instances (cheaper for Android).
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        # Mirrors eas.json's "preview" profile so the app talks to the live API.
        EXPO_PUBLIC_API_URL: "https://api.zitch.ng"
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/.gradle/caches
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Expo prebuild (generate the native android/ project)
        script: npx expo prebuild --platform android --clean
      - name: Build release APK
        # Expo's prebuild template signs the release variant with the debug key,
        # so this APK is installable for testing/sideloading out of the box.
        # For a Play Store upload, configure Android code signing in Codemagic
        # and switch to `assembleRelease`/`bundleRelease` with that keystore.
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
    # Auto-build when app code lands on main. The changeset filter skips
    # landing/docs/backend-only changes so it doesn't burn free build minutes on
    # changes that don't affect the APK. Trigger manually anytime from the
    # dashboard ("Start new build" → android-apk).
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      when:
        changeset:
          includes:
            - 'app'
            - 'components'
            - 'lib'
            - 'assets'
            - 'package.json'
            - 'package-lock.json'
            - 'app.json'
            - 'eas.json'
            - 'codemagic.yaml'
    # Optional — email the APK link when the build finishes:
    # publishing:
    #   email:
    #     recipients:
    #       - you@example.com
    #     notify:
    #       success: true
    #       failure: true
