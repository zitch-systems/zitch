# Render blueprint. In Render: New + > Blueprint > point at this repo (root
# dir = backend). Creates the web service + a managed Postgres and wires them.
services:
  - type: web
    name: zitch-api
    runtime: python
    rootDir: backend
    plan: free   # upgrade to "starter" before handling real money (no sleep)
    buildCommand: "./build.sh"
    startCommand: "gunicorn zitch_api.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: TOKEN_TTL_HOURS
        value: "24"
      # Origins allowed to call the API cross-origin (Expo web build /
      # browser-based dashboards). Native React Native does not enforce CORS,
      # so the mobile app is unaffected. Add new origins here as needed.
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:8081,http://localhost:19006,http://localhost:19000"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString
      # Fill these in the Render dashboard (kept out of source):
      - key: VTPASS_API_KEY
        sync: false
      - key: VTPASS_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false

  # TODO: re-enable the daily Fixed Save maturity payout cron after the
  # web service is upgraded to a paid plan. Render's cron service type
  # has no free tier, so leaving this in would break the Blueprint.
  # Until then, run it on demand from the Render shell:
  #   python manage.py run_maturities
  # Original block (uncomment and switch plan to starter or above):
  #   - type: cron
  #     name: zitch-maturities
  #     runtime: python
  #     rootDir: backend
  #     plan: starter
  #     schedule: "0 1 * * *"   # 01:00 UTC daily
  #     buildCommand: "pip install -r requirements.txt"
  #     startCommand: "python manage.py run_maturities"
  #     envVars:
  #       - key: DJANGO_SECRET_KEY
  #         generateValue: true
  #       - key: DJANGO_DEBUG
  #         value: "false"
  #       - key: DATABASE_URL
  #         fromDatabase:
  #           name: zitch-db
  #           property: connectionString

databases:
  - name: zitch-db
    plan: free   # upgrade before go-live; free Postgres expires
