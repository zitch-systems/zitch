# Render blueprint. In Render: New + > Blueprint > point at this repo (root
# dir = backend). Creates the web service + a managed Postgres and wires them.
services:
  - type: web
    name: zitch-api
    runtime: python
    rootDir: backend
    plan: free   # upgrade to "starter" before handling real money (no sleep)
    buildCommand: "./build.sh"
    # Bind to 0.0.0.0:$PORT so Render's port scan can detect the service. Without
    # an explicit --bind, gunicorn listens on 127.0.0.1:8000 (loopback only), which
    # Render can't see -> "no open ports detected" and the deploy times out. Render
    # injects PORT (default 10000, which the health check targets).
    startCommand: "gunicorn zitch_api.wsgi:application --bind 0.0.0.0:${PORT:-10000}"
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,api.zitch.ng"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://api.zitch.ng"
      - key: TOKEN_TTL_HOURS
        value: "24"
      # Origins allowed to call the API cross-origin (Expo web build /
      # browser-based dashboards). Native React Native does not enforce CORS,
      # so the mobile app is unaffected. Add new origins here as needed.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://zitch.ng,https://www.zitch.ng,http://localhost:8081,http://localhost:19006,http://localhost:19000"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString
      # Fill these in the Render dashboard (kept out of source):
      # Money rail — Kora (Korapay): funding, virtual accounts, payouts, balances,
      # BVN/NIN/vNIN identity, card issuing. One base URL serves both modes; the
      # key prefix (sk_test_/sk_live_) selects test vs live. Blank SECRET_KEY =>
      # mock mode. Diagnose with `manage.py kora_check`. BASE_URL defaults to
      # https://api.korapay.com/merchant in code. Set the Kora dashboard webhooks
      # to /api/fund/webhook/ (pay-in) and /api/transfers/webhook/ (payout).
      - key: KORA_SECRET_KEY
        sync: false
      - key: KORA_PUBLIC_KEY
        sync: false
      # Optional: enables /kora-diagnose?token=... browser self-test.
      - key: KORA_DIAG_TOKEN
        sync: false
      # Virtual-card backend: "kora" or "issuer" (generic CARD_ISSUER); blank => auto.
      - key: CARD_PROVIDER
        sync: false
      # Wallet FUND-IN rail: "monnify" or "kora"; blank => auto (Monnify if its keys
      # are set, else Kora).
      - key: PAYMENT_PROVIDER
        sync: false
      # Bank-PAYOUT + recipient name-enquiry rail: blank => kora (the production
      # choice). "wema" exists but is ARCHIVED — do not set it.
      - key: PAYOUT_PROVIDER
        sync: false
      # BVN/NIN KYC rail: blank => auto (Monnify when its keys are set — the
      # production choice — else Kora). vNIN + face stay on Kora/Prembly.
      - key: KYC_PROVIDER
        sync: false
      # ---------------------------------------------------------------------
      # Wema / ALAT — ARCHIVED (2026-07). Integration code is retained and opt-in
      # only; NOTHING routes to Wema unless a *_PROVIDER env is explicitly set to
      # "wema". Verified on test keys: auth + bank list + name enquiry. Blocked on
      # Wema's side: the sandbox does not mint partnership accounts/OTPs, and the
      # securityInfo scheme + tx-status legend are undocumented. To resume, see
      # docs/wema-migration.md. The env vars below can stay blank.
      # ---------------------------------------------------------------------
      - key: WEMA_CHANNEL_ID
        sync: false
      - key: WEMA_WALLET_KEY
        sync: false
      - key: WEMA_CARD_KEY
        sync: false
      - key: WEMA_AIRTIME_KEY
        sync: false
      - key: WEMA_BILLS_KEY
        sync: false
      - key: WEMA_KYC_KEY
        sync: false
      - key: WEMA_SOURCE_ACCOUNT
        sync: false
      - key: WEMA_SECURITY_INFO
        sync: false
      - key: WEMA_BASE_URL
        sync: false
      - key: WEMA_SIMULATION
        sync: false
      # Monnify (fund-in): dedicated virtual accounts + hosted checkout. Reserved-
      # account collections need NO IP whitelisting. Blank keys => mock; set
      # MONNIFY_SIMULATION=true to test the fund-in flow in a real build without live
      # keys (no real money). BASE_URL: live https://api.monnify.com, sandbox
      # https://sandbox.monnify.com. Set the Monnify webhook to /api/fund/monnify/webhook/.
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_BASE_URL
        sync: false
      # Open banking — Mono (link bank, balance/transactions, DirectPay funding).
      # Blank SECRET_KEY => mock. Webhook: /api/banklink/webhook/. BASE_URL
      # defaults to https://api.withmono.com in code.
      - key: MONO_SECRET_KEY
        sync: false
      - key: MONO_PUBLIC_KEY
        sync: false
      - key: MONO_WEBHOOK_SECRET
        sync: false
      # VTU / bills — VTU.ng (v2). JWT Bearer auth, no IP whitelisting. Set
      # VTUNG_API_KEY (a long-lived token) OR VTUNG_USERNAME + VTUNG_PASSWORD
      # (auto-refreshed JWT).
      - key: VTUNG_API_KEY
        sync: false
      - key: VTUNG_USERNAME
        sync: false
      - key: VTUNG_PASSWORD
        sync: false
      # SMS / OTP — Sendchamp.
      - key: SENDCHAMP_API_KEY
        sync: false
      # Email / OTP fallback — Resend. Sends the same OTP alongside SMS so an
      # SMS routing issue (DND / sender ID block) never strands signup.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "no-reply@zitch.ng"
      # KYC — Prembly (IdentityPass); also gates the large-transfer face check.
      - key: PREMBLY_API_KEY
        sync: false
      - key: PREMBLY_APP_ID
        sync: false
      # Virtual card issuer. The integration is generic (configurable base URL +
      # Bearer key, standard /cards endpoints) — set these for your provider
      # (e.g. Sudo, Maplerad, Bani). Until API_KEY is set the card feature fails
      # closed in production (no fake cards). BRAND defaults to Verve in code.
      - key: CARD_ISSUER_API_KEY
        sync: false
      - key: CARD_ISSUER_BASE_URL
        sync: false
      - key: CARD_ISSUER_BRAND
        sync: false
      # FX rail — Fincra (multi-currency Convert). Without these the Convert
      # screen fails closed in production. NGN/USD/GBP/CAD settle; CNY is
      # quote-only. BASE_URL defaults to https://api.fincra.com in code.
      - key: FINCRA_SECRET_KEY
        sync: false
      - key: FINCRA_BUSINESS_ID
        sync: false
      # WhatsApp channel — Meta Cloud API. Blank TOKEN => channel stays mocked.
      # Set the same VERIFY_TOKEN in the Meta app dashboard; APP_SECRET enables
      # inbound webhook HMAC verification.
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_BUSINESS_NUMBER
        sync: false
      # WhatsApp AI intent layer (optional). Blank => the deterministic router
      # handles everything; the model only proposes intents, never moves money.
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false

  # Daily Fixed Save maturity sweep — pays out matured plans, including for
  # users who never open the app. REQUIRES A PAID RENDER PLAN: the cron service
  # type has no free tier, so on a free plan this block fails the Blueprint sync.
  # (Maturities also settle on access via /api/savings/list/, so the app stays
  # correct even without this cron.)
  - type: cron
    name: zitch-maturities
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "0 1 * * *"   # 01:00 UTC daily
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_maturities"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString

  # VTU reconciliation — settle purchases left PENDING by a provider timeout:
  # requery the aggregator by reference, then mark Successful (delivered) or
  # refund (definitively failed). Also requires a paid plan (cron has no free
  # tier). Runs every 10 minutes so stuck purchases clear quickly.
  - type: cron
    name: zitch-reconcile-vtu
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py reconcile_vtu"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: zitch-db
          property: connectionString

  # (The zitch-reconcile-wema cron was removed when Wema was archived — restore it
  # from docs/wema-migration.md if the Wema rail is ever resumed.)

databases:
  - name: zitch-db
    plan: free   # upgrade before go-live; free Postgres expires
