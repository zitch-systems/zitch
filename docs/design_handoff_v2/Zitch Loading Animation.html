<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zitch — Loading Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: radial-gradient(120% 90% at 50% 0%, #16302B, #0A1614 70%);
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .loader { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; perspective: 560px; }
  .arc { position: absolute; inset: 0; animation: zspin 1.1s linear infinite; }
  .badge {
    width: 104px; height: 104px; border-radius: 50%; display: block; object-fit: cover;
    animation: zflip 1.9s cubic-bezier(.5,0,.5,1) infinite;
    filter: drop-shadow(0 12px 28px rgba(92, 245, 235, .45));
  }
  .word { font-size: 30px; font-weight: 800; letter-spacing: .18em; margin-top: 2px; }
  .tag { font-size: 14px; color: rgba(255, 255, 255, .7); }
  .foot { position: fixed; bottom: 34px; font-size: 12px; color: rgba(255, 255, 255, .4); }
  @keyframes zspin { to { transform: rotate(360deg); } }
  @keyframes zflip { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }
  @keyframes zpulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; }
  .controls button {
    font-family: inherit; font-size: 12.5px; font-weight: 700; color: #fff;
    background: rgba(255, 255, 255, .1); border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 999px; padding: 7px 14px; cursor: pointer;
  }
  .controls button:hover { background: rgba(255, 255, 255, .18); }
  @media (prefers-reduced-motion: reduce) { .arc, .badge { animation: none; } }
</style>
</head>
<body>
  <div class="loader">
    <img class="badge" src="assets/brand/zitch-badge.png" alt="Zitch" />
  </div>
  <div class="word">ZITCH</div>
  <div class="tag">Pay. Send. Grow.</div>
  <div class="foot">Branded loader · loops continuously for preview</div>
  <div class="controls">
    <button onclick="document.querySelector('.badge').style.animationDuration='1.2s'">Faster</button>
    <button onclick="document.querySelector('.badge').style.animationDuration='1.9s'">Normal</button>
    <button onclick="document.querySelector('.badge').style.animationDuration='2.6s'">Slower</button>
  </div>
</body>
</html>
